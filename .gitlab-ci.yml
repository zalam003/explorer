deploy-sbx:
  image: alpine:latest
  services:
    - docker:dind
  stage: deploy-sbx
  tags:
    - docker_runner
  script:
    - apk add --no-cache git curl build-base autoconf automake linux-headers openssl-dev openssh
    - chmod og= $ID_RSA
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "aws ecr get-login-password | docker login --username AWS --password-stdin $CONTAINER_REGISTRY"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP 'export AWS_REGION=$AWS_REGION'
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_IP 'docker-credential-ecr-login list' 
    - scp -i $ID_RSA -o StrictHostKeyChecking=no -r ./scripts $SERVER_USER@$SBX_SERVER_IP:$APP_DIR/.
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "if [[ ! -d $APP_DIR/logs ]]; then mkdir $APP_DIR/logs; chmod 777 $APP_DIR/logs; fi"
#    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "if [[ -z `grep $SERVER_USER /etc/group | grep docker` ]]; then sudo groupadd docker; sudo usermod -aG docker $SERVER_USER; fi"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "docker pull $TAG2_LATEST"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "docker container rm -f $APP2_NAME || true"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "docker run --rm --name CREATE_SCHEMA --env-file $APP_DIR/scripts/sandbox.env --volume $APP_DIR/logs:/opt/app/logs $TAG2_LATEST /bin/sh -c mix do ecto.create, ecto.migrate"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "docker run -d --name $APP2_NAME --env-file $APP_DIR/scripts/sandbox.env --volume $APP_DIR/logs:/opt/app/logs -p 4000:4000 $TAG2_LATEST /bin/sh -c mix phx.server"
    - sleep 10
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "docker ps -a"
    - sleep 10
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "docker logs $APP2_NAME"
  environment:
    name: development
    url: $SERVER_HOST
  only:
    <<: *sbx_triggers

