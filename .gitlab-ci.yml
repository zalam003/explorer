############################################################
#                      Variables                           #
############################################################
# Include all variables
include:
  - local: '/scripts/variables.yml'

############################################################
#                         Stages                           #
############################################################
stages:
  - build-base
  - build-dev-image
  - build
  - scan
  - deploy-sbx-schema
  - deploy-sbx-indexer
  - deploy-sbx-webapp
  - deploy-testnet-schema
  - deploy-testnet-indexer
  - deploy-testnet-webapp1
  - deploy-testnet-webapp2
  - deploy-mainnet-schema
  - deploy-mainnet-indexer
  - deploy-mainnet-webapp1
  - deploy-mainnet-webapp2

############################################################
#                       Triggers                           #
############################################################
.sbx_triggers: &sbx_triggers
  refs:
    - sandbox
    
.testnet_triggers: &testnet_triggers
  refs:
    - develop

.mainnet_triggers: &mainnet_triggers
  refs:
    - master

############################################################
#                        Runner                            #
############################################################
.runner:
  tags: [docker_runner]

############################################################
#                        Scripts                           #
############################################################

# Update variables and generate environment file
.set_variables:
  before_script:
    - echo "create environment file"
    - cd scripts
    - sed -i "11iECRHOST=$CONTAINER_REGISTRY" start.sh
    - cp template.env ${ENVFILE}
    - if [[ ${ISINDEXER} == no ]]; then echo "Disable indexer on webapp"; sed -i '19iDISABLE_INDEXER=true' ${ENVFILE}; fi
    - if [[ ${ISINDEXER} == yes ]]; then cp ../apps/indexer/config/config.exs . ; sed -i "s/1 <<< 30/${INDEXER_MEM} <<< 30/g" config.exs; fi
    - if [[ "${ENV_PREFIX}" == "MAINNET" || "${ENV_PREFIX}" == "SANDBOX" ]]; then echo "Switch to mainnet"; sed -i "s/Testnet/Mainnet/g" ${ENVFILE}; sed -i "s/testnet.json/mainnet.json/g" ${ENVFILE}; fi
    - sed -i "s/CORENODEIP/${CORENODE_IP}/g" ${ENVFILE}
    - sed -i "s/WSPORT/${WSPORT}/g" ${ENVFILE}
    - sed -i "s/HTTPPORT/${HTTPPORT}/g" ${ENVFILE}
    - sed -i "s/CHAINID/${CHAINID}/g" ${ENVFILE}
    - sed -i "s/WEBPORT/${WEBPORT}/g" ${ENVFILE}
    - sed -i "s|SECRETKEYBASE|${SECRET_KEY_BASE}|g" ${ENVFILE}
    - sed -i "s|ENERGISWAPAPIURL|${ENERGISWAP_API_URL}|g" ${ENVFILE}
    - sed -i "s|WNRGTOKENADDRESS|${WNRG_TOKEN_ADDRESS}|g" ${ENVFILE}
    - sed -i "s|NODEAPI|${NODEAPI}|g" ${ENVFILE}
    - sed -i "s/DBUSERNAME/${DB_USERNAME}/g" ${ENVFILE}
    - sed -i "s|DBPASSWORD|${DB_PASSWORD}|g" ${ENVFILE}
    - sed -i "s/DBNAME/${DB_NAME}/g" ${ENVFILE}
    - sed -i "s/DBHOST/${DB_HOSTNAME}/g" ${ENVFILE}
    - sed -i "s/DBPOOLSIZE/${DBPOOLSIZE}/g" ${ENVFILE}
    - sed -i "s/REWARDSCONTRACT/${REWARDSCONTRACT}/g" ${ENVFILE}
    - sed -i "s|ESAUTHSECRET|${AUTHORIZATION_SECRET}|g" ${ENVFILE}
    - sed -i "s/EXPLORERHOST/${SERVER_HOST}/g" ${ENVFILE}
    - sed -i "s/CAPTCHASECRET/${CAPTCHASECRET}/g" ${ENVFILE}
    - sed -i "s/CAPTCHACLIENT/${CAPTCHACLIENT}/g" ${ENVFILE}
    - cd -

# Script to deploy Docker image to server
.deploy_image:
  script:
    - apk add --no-cache git curl build-base autoconf automake linux-headers openssl-dev openssh bash
    - eval $(ssh-agent -s)
    - echo "$SSH_RSA_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "Deploy $ENVIRONMENT $RUN_APP as $SERVER_USER on $DEPLOY_SERVER_IP"
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP 'export AWS_REGION=$AWS_REGION'
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP 'if [[ -d $APP_DIR/scripts ]]; then rm -rf $APP_DIR/scripts; fi'
    - scp -o StrictHostKeyChecking=no -r ./scripts $SERVER_USER@$DEPLOY_SERVER_IP:$APP_DIR/.
    - echo "TAG $TAG_LATEST App Name $APP_NAME"
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP "docker pull $TAG_LATEST"
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP "docker container rm -f ${APP_NAME}_${ENVIRONMENT} || true"
    - ssh -tt -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP "cd $APP_DIR/scripts && ./start.sh -e ${ENVIRONMENT} -r ${RUN_APP} -i ${CONTAINER_REGISTRY}"

# Script to update schema
.update_schema:
  script:
    - apk add --no-cache git curl build-base autoconf automake linux-headers openssl-dev openssh bash
    - eval $(ssh-agent -s)
    - echo "$SSH_RSA_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - echo "Deploy schema as $SERVER_USER on $DEPLOY_SERVER_IP"
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP 'sudo su - && export AWS_REGION=$AWS_REGION'
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP 'if [[ -d $APP_DIR/scripts ]]; then rm -rf $APP_DIR/scripts; fi'
    - scp -o StrictHostKeyChecking=no -r ./scripts $SERVER_USER@$DEPLOY_SERVER_IP:$APP_DIR/.
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP "docker pull $TAG1_LATEST"
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP "docker container rm -f $SCHEMA_NAME || true"
    - echo "Create or update DB schema"
    - ssh -tt -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP "cd $APP_DIR/scripts && ./start.sh -e ${ENVIRONMENT} -r ${RUN_APP} -i $CONTAINER_REGISTRY"
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP "cd $APP_DIR/scripts && ./token_remove.sh ${ENVIRONMENT}"
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP "cd $APP_DIR/scripts && ./token_rename.sh ${ENVIRONMENT}"
    - ssh -o StrictHostKeyChecking=no $SERVER_USER@$DEPLOY_SERVER_IP "cd $APP_DIR/scripts && ./remove_moniker.sh ${ENVIRONMENT}"

############################################################
#                     Build Base Image                     #
############################################################
build-base:
  stage: build-base
  tags:
    - docker_runner
  before_script:
    - apk add bash
  script:
    - cd scripts
    - ./start.sh -r build_base_image
    - docker tag $BASE_IMAGE_LATEST $BASE_IMAGE_COMMIT
    - docker push $BASE_IMAGE_COMMIT
    - docker push $BASE_IMAGE_LATEST
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - .tool-versions
        - scripts/build_base_image

############################################################
#                  Build Developer Image                   #
############################################################
build-dev-image:
  stage: build-dev-image
  tags:
    - docker_runner
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - cp submodules/assets/tokens/* apps/block_scout_web/assets/static/images/tokens
    - cd scripts
    - sed -i "s|$DEFAULT_IMAGE|$BASE_IMAGE_LATEST|g" Dockerfile_webapp
    - docker build --cache-from $TAG2_LATEST -f ./Dockerfile_webapp -t $TAG2_COMMIT ../
    - docker push $TAG2_COMMIT
    - echo "########################################################################"
    - echo " Run to pull image"
    - echo " docker pull $ECR_PROXY_REGISTRY/$APP2_NAME:$CI_COMMIT_SHORT_SHA"
    - echo "########################################################################"
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "false" && $CI_PIPELINE_SOURCE == "push"'
      changes:
        - apps/**/*
        - submodules/assets/tokens/*
        - .gitlab-ci.yml
        - scripts/Dockerfile_{indexer,webapp,base_image}
      when: manual

############################################################
#                      Build indexer                       #
############################################################
build-indexer:
  stage: build
  tags:
    - docker_runner
  script:
    - cd scripts
    - sed -i "s|$DEFAULT_IMAGE|$BASE_IMAGE_LATEST|g" Dockerfile_indexer
    - docker build --cache-from $TAG1_LATEST -f ./Dockerfile_indexer -t $TAG1_COMMIT -t $TAG1_LATEST ../
    - docker push $TAG1_COMMIT
    - docker push $TAG1_LATEST
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - apps/**/*
        - scripts/Dockerfile_{indexer,webapp,base_image}
        - scripts/start.sh
    - if: $CI_COMMIT_TAG

############################################################
#                       Build webapp                       #
############################################################
build-webapp:
  stage: build
  tags:
    - docker_runner
  variables:
    GIT_SUBMODULE_STRATEGY: recursive
  script:
    - cp submodules/assets/tokens/* apps/block_scout_web/assets/static/images/tokens
    - cd scripts
    - sed -i "s|$DEFAULT_IMAGE|$BASE_IMAGE_LATEST|g" Dockerfile_webapp
    - docker build --cache-from $TAG2_LATEST -f ./Dockerfile_webapp -t $TAG2_COMMIT -t $TAG2_LATEST ../
    - docker push $TAG2_COMMIT
    - docker push $TAG2_LATEST
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - apps/**/*
        - submodules/assets/tokens/*
        - scripts/Dockerfile_{indexer,webapp,base_image}
        - scripts/start.sh
    - if: $CI_COMMIT_TAG

############################################################
#                       Scan webapp                       #
############################################################
scan-webapp:
  stage: scan
  needs: [build-webapp]
  variables:
    ENVIRONMENT: testnet
  tags:
    - docker_runner
  image:
    name: aquasec/trivy:latest
    entrypoint: ['']
  services:
    - docker:dind
  script:
    - echo "Scan $APP_NAME Docker Image for the $ENVIRONMENT"
    - trivy --no-progress --output gl-container-scanning-report.json $CONTAINER_REGISTRY/$APP2_NAME:latest
    - trivy --exit-code 1 --no-progress --severity CRITICAL $CONTAINER_REGISTRY/$APP2_NAME:latest
  cache:
    paths:
      - .trivycache/
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
  allow_failure: true
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - stuck_or_timeout_failure  
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - apps/**/*
        - scripts/Dockerfile_{indexer,webapp,base_image}
        - scripts/start.sh
    - if: $CI_COMMIT_TAG

############################################################
#                       Scan indexer                       #
############################################################
scan-indexer:
  stage: scan
  needs: [build-indexer]
  variables:
    ENVIRONMENT: testnet
  tags:
    - docker_runner
  image:
    name: aquasec/trivy:latest
    entrypoint: ['']
  services:
    - docker:dind
  script:
    - echo "Scan $APP_NAME Docker Image for the $ENVIRONMENT"
    - trivy --no-progress --output gl-container-scanning-report.json $CONTAINER_REGISTRY/$APP1_NAME:latest
    - trivy --exit-code 1 --no-progress --severity CRITICAL $CONTAINER_REGISTRY/$APP1_NAME:latest
  cache:
    paths:
      - .trivycache/
  artifacts:
    reports:
      container_scanning: gl-container-scanning-report.json
  allow_failure: true
  retry:
    max: 2
    when:
      - script_failure
      - runner_system_failure
      - stuck_or_timeout_failure 
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - apps/**/*
        - scripts/Dockerfile_{indexer,webapp,base_image}
        - scripts/start.sh
    - if: $CI_COMMIT_TAG

############################################################
#                         Sandbox                          #
############################################################

# Update sandbox schema
sbx-schema:
  image: alpine:latest
  services:
    - docker:dind
  stage: deploy-sbx-schema
  needs: 
    - job: scan-indexer
      optional: true
  tags:
    - docker_runner
  variables: !reference [.sandbox_schema_variables, variables]
  extends:
    - .set_variables
    - .update_schema
  only:
    <<: *sbx_triggers

# Deploy indexer in Sandbox
sbx-idxr:
  image: alpine:latest
  services:
    - docker:dind
  stage: deploy-sbx-indexer
  needs: [sbx-schema]
  tags:
    - docker_runner
  variables: !reference [.sandbox_indexer_variables, variables]
  extends:
    - .deploy_image
  only:
    <<: *sbx_triggers

# Deploy webapp in Sandbox
sbx-web1:
  image: alpine:latest
  services:
    - docker:dind
  stage: deploy-sbx-webapp
  needs: 
    - job: scan-webapp
      optional: true
  tags:
    - docker_runner
  variables: !reference [.sandbox_webapp_variables, variables]
  extends:
    - .set_variables
    - .deploy_image
  only:
    <<: *sbx_triggers

