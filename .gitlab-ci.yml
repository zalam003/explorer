build-webapp:
  stage: build-webapp
  tags:
    - docker_runner
  script:
    - cd scripts
    - docker build -f ./Dockerfile_webapp -t $TAG2_COMMIT -t $TAG2_LATEST ../
    - docker push $TAG2_COMMIT
    - docker push $TAG2_LATEST
  only:
    <<: *sbx_triggers

