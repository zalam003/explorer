  SCHEMA_NAME: explorer_schema
  SANDBOX_SERVER_IP: "$SANDBOX_SERVER_IP"
  SANDBOX_SERVER_HOST: "explorer.develop.energi.network"
  TESTNET_SERVER_HOST: "explorer.test.energi.network"
  MAINNET_SERVER_HOST: "explorer.energi.network"
  TESTNET_ENERGISWAP_API_URL: "https://api.test.energiswap.exchange/v1"
  MAINNET_ENERGISWAP_API_URL: "https://api.energiswap.exchange/v1"
  SANDBOX_ENERGISWAP_API_URL: "https://api.energiswap.exchange/v1"
  TESTNET_WNRG_TOKEN_ADDRESS: "0x184F7b12f29d675f34ff816528ADBfd0E0501Ad4"
  MAINNET_WNRG_TOKEN_ADDRESS: "0xA55F26319462355474A9F2c8790860776a329aA4"
  SANDBOX_WNRG_TOKEN_ADDRESS: "0xA55F26319462355474A9F2c8790860776a329aA4"
  TESTNET_REWARDS_CONTRACT: "0x038239dA913f994698fff950980BC192A0CcFB23"
  MAINNET_REWARDS_CONTRACT: "0x6EACC274D1Ef48DFBbbC7Be8829E48e5681B932e"
  SANDBOX_REWARDS_CONTRACT: "0x6EACC274D1Ef48DFBbbC7Be8829E48e5681B932e"
