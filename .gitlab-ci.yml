build-image:
  stage: build
  tags:
    - docker_runner
  script:
    - cd scripts
    - aws ecr create-repository --repository-name $APP1_NAME || true
    - docker build --cache-from $TAG1_LATEST -f ./Dockerfile_webapp -t $TAG1_COMMIT -t $TAG1_LATEST ../
    - docker push $TAG1_COMMIT
    - docker push $TAG1_LATEST
    - docker build --cache-from $TAG2_LATEST -f ./Dockerfile_indexer -t $TAG2_COMMIT -t $TAG2_LATEST ../
    - docker push $TAG2_COMMIT
    - docker push $TAG2_LATEST
  only:
    <<: *sbx_triggers

sbx-schema:
  image: alpine:latest
  services:
    - docker:dind
  stage: deploy-sbx-schema
  tags:
    - docker_runner
  script:
    - apk add --no-cache git curl build-base autoconf automake linux-headers openssl-dev openssh bash
    - chmod og= $ID_RSA
    - echo "Deploy to $SBX_SERVER_IP"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP 'sudo su - && export AWS_REGION=$AWS_REGION'
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP 'if [[ -d $APP_DIR/scripts ]]; then rm -rf $APP_DIR/scripts; fi'
    - echo "RE_CAPTCHA_SECRET_KEY=${CAPTCHASECRET}" >> ./scripts/develop.env
    - echo "RE_CAPTCHA_CLIENT_KEY=${CAPTCHACLIENT}" >> ./scripts/develop.env
    - scp -i $ID_RSA -o StrictHostKeyChecking=no -r ./scripts $SERVER_USER@$SBX_SERVER_IP:$APP_DIR/.
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "docker pull $TAG1_LATEST"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "docker container rm -f $SCHEMA_NAME || true"
    - echo "Create DB schema"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "cd $APP_DIR/scripts && ./start.sh -e develop -r schema_aws -i $CONTAINER_REGISTRY"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "cd $APP_DIR/scripts && ./token_remove.sh develop"
    - ssh -i $ID_RSA -o StrictHostKeyChecking=no $SERVER_USER@$SBX_SERVER_IP "cd $APP_DIR/scripts && ./token_rename.sh develop"
  only:
    <<: *sbx_triggers

