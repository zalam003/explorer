variables:
  SERVER_USER: ubuntu
  SCHEMA_NAME: explorer_schema
  SBX_SERVER_IP: $SANDBOX_SERVER_IP
  SBX_SERVER_HOST: explorer.develop.energi.network
  TESTNET_SERVER_HOST: explorer.test.energi.network
  MAINNET_SERVER_HOST: explorer.energi.network
  APP_DIR: /home/$SERVER_USER
  APP1_NAME: explorer_webapp
  APP2_NAME: explorer_indexer
  TAG1_LATEST: $CONTAINER_REGISTRY/$APP1_NAME:latest
  TAG1_COMMIT: $CONTAINER_REGISTRY/$APP1_NAME:$CI_COMMIT_SHORT_SHA
  TAG2_LATEST: $CONTAINER_REGISTRY/$APP2_NAME:latest
  TAG2_COMMIT: $CONTAINER_REGISTRY/$APP2_NAME:$CI_COMMIT_SHORT_SHA
  PROJECT_NAME: BlockExplorer

stages:
  - build
  - deploy-sbx-schema
  - deploy-sbx
  - deploy-testnet-schema
  - deploy-testnet-indexer
  - deploy-testnet-webapp
  - deploy-mainnet-schema
  - deploy-mainnet-indexer
  - deploy-mainnet-webapp

.sbx_triggers: &sbx_triggers
  refs:
    - sandbox

.testnet_triggers: &testnet_triggers
  refs:
    - develop

.mainnet_triggers: &mainnet_triggers
  refs:
    - master

.runner:
  tags: [docker_runner]

.before_script_template: &testnet_indexer_vars
  before_script:
    - cd scripts
    - sed -i "12iIMAGE=$CONTAINER_REGISTRY" start.sh
    - cp template.env testnet.env
    - sed -i "s/CORENODEIP/${TESTNET_CORENODE_IP1}/g" testnet.env
    - sed -i "s/WSPORT/49795/g" testnet.env
    - sed -i "s/HTTPPORT/49796/g" testnet.env
    - sed -i "s/CHAINID/49797/g" testnet.env
    - sed -i "s|SECRETKEYBASE|${TESTNET_SECRET_KEY_BASE}|g" testnet.env
    - sed -i "s/DBUSERNAME/${TESTNET_DB_USERNAME}/g" testnet.env
    - sed -i "s|DBPASSWORD|${TESTNET_DB_PASSWORD}|g" testnet.env
    - sed -i "s/DBNAME/${TESTNET_DB_NAME}/g" testnet.env
    - sed -i "s/DBHOST/${TESTNET_DB_HOSTNAME}/g" testnet.env
    - sed -i "s/REWARDS_CONTRACT/\#REWARDS_CONTRACT/g" testnet.env
    #- sed -i "s/REWARDCONTRACT/${TESTNET_REWARDCONTRACT}/g" testnet.env
    - sed -i "s/EXPLORERHOST/${TESTNET_SERVER_HOST}/g" testnet.env
    - sed -i "s/CAPTCHASECRET/${CAPTCHASECRET}/g" testnet.env
    - sed -i "s/CAPTCHACLIENT/${CAPTCHACLIENT}/g" testnet.env
    - cd -

.before_script_template: &testnet_webapp_vars
  before_script:
    - cd scripts
    - sed -i "12iIMAGE=$CONTAINER_REGISTRY" start.sh
    - cp template.env testnet.env
    - sed -i '19iDISABLE_INDEXER=true' testnet.env
    - sed -i "s/CORENODEIP/${TESTNET_CORENODE_IP2}/g" testnet.env
    - sed -i "s/WSPORT/49795/g" testnet.env
    - sed -i "s/HTTPPORT/49796/g" testnet.env
    - sed -i "s/CHAINID/49797/g" testnet.env
    - sed -i "s|SECRETKEYBASE|${TESTNET_SECRET_KEY_BASE}|g" testnet.env
    - sed -i "s/DBUSERNAME/${TESTNET_DB_USERNAME}/g" testnet.env
    - sed -i "s|DBPASSWORD|${TESTNET_DB_PASSWORD}|g" testnet.env
    - sed -i "s/DBNAME/${TESTNET_DB_NAME}/g" testnet.env
    - sed -i "s/DBHOST/${TESTNET_DB_HOSTNAME}/g" testnet.env
    - sed -i "s/REWARDS_CONTRACT/\#REWARDS_CONTRACT/g" testnet.env
    #- sed -i "s/REWARDCONTRACT/${TESTNET_REWARDCONTRACT}/g" testnet.env
    - sed -i "s/EXPLORERHOST/${TESTNET_SERVER_HOST}/g" testnet.env
    - sed -i "s/CAPTCHASECRET/${CAPTCHASECRET}/g" testnet.env
    - sed -i "s/CAPTCHACLIENT/${CAPTCHACLIENT}/g" testnet.env
    - cd -

