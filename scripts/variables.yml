  MAINNET_NODEAPI: "https://nodeapi.energi.network/v1/jsonrpc"
  SANDBOX_NODEAPI: "https://nodeapi.energi.network/v1/jsonrpc"
  APP_DIR: "/home/$SERVER_USER"
  DEFAULT_IMAGE: "bitwalker/alpine-elixir-phoenix:1.12.2"
  BASE_IMAGE_NAME: "explorer_base_image"
  APP1_NAME: "explorer_indexer"
  APP2_NAME: "explorer_webapp"
  BASE_IMAGE_LATEST: "$CONTAINER_REGISTRY/$BASE_IMAGE_NAME:latest"
  BASE_IMAGE_COMMIT: "$CONTAINER_REGISTRY/$BASE_IMAGE_NAME:$CI_COMMIT_SHORT_SHA"
  TAG1_LATEST: "$CONTAINER_REGISTRY/$APP1_NAME:latest"
  TAG1_COMMIT: "$CONTAINER_REGISTRY/$APP1_NAME:$CI_COMMIT_SHORT_SHA"
  TAG2_LATEST: "$CONTAINER_REGISTRY/$APP2_NAME:latest"
  TAG2_COMMIT: "$CONTAINER_REGISTRY/$APP2_NAME:$CI_COMMIT_SHORT_SHA"
  PROJECT_NAME: "BlockExplorer"

  # Secret variables set elsewhere
  # CONTAINER_REGISTRY
  # {SANDBOX,TESTNET,MAINNET}_SERVER_IP
  # {SANDBOX,TESTNET,MAINNET}_CORENODE_IP
  # {SANDBOX,TESTNET,MAINNET}_DB_NAME
  # {SANDBOX,TESTNET,MAINNET}_DB_USERNAME
  # {SANDBOX,TESTNET,MAINNET}_DB_PASSWORD
  # {SANDBOX,TESTNET,MAINNET}_SECRET_KEY_BASE
  # {SANDBOX,TESTNET,MAINNET}_AUTHORIZATION_SECRET

# Variables for sandbox / develop
.sandbox_schema_variables:
  variables:
    WEBPORT: 4100
    DBPOOLSIZE: 50
    INDEXER_MEM: 6
    ENVIRONMENT: "develop"
    ISINDEXER: "yes"
    ENVFILE: "develop_indexer.env"
    ENV_PREFIX: "SANDBOX"
    RUN_APP: "schema_aws"
    APP_NAME: "$APP1_NAME"
    CORENODE_IP: "$SANDBOX_CORENODE_IP"
    WSPORT: 39795
    HTTPPORT: 39796
    CHAINID: 39797
    DEPLOY_SERVER_IP: "$SANDBOX_SERVER_IP"
    SERVER_HOST: $SANDBOX_SERVER_HOST
    ENERGISWAP_API_URL: "$SANDBOX_ENERGISWAP_API_URL"
    WNRG_TOKEN_ADDRESS: "$SANDBOX_WNRG_TOKEN_ADDRESS"
    NODEAPI: "$SANDBOX_NODEAPI"
    AUTHORIZATION_SECRET: "$SANDBOX_AUTHORIZATION_SECRET"
    TAG_LATEST: "$CONTAINER_REGISTRY/$APP1_NAME:latest"
    DB_NAME: "explorer_develop_db"
    DB_USERNAME: "explorer_develop"
    DB_PASSWORD: "$SANDBOX_DB_PASSWORD"
    SECRET_KEY_BASE: "$SANDBOX_SECRET_KEY_BASE"
    REWARDSCONTRACT: "$SANDBOX_REWARDS_CONTRACT"

.sandbox_indexer_variables:
  variables:
    WEBPORT: 4100
    DBPOOLSIZE: 50
    INDEXER_MEM: 6
    ENVIRONMENT: "develop"
    ISINDEXER: "yes"
    RUN_APP: "run_indexer"
    APP_NAME: $APP1_NAME
    ENVFILE: "develop_indexer.env"
    ENV_PREFIX: "SANDBOX"
    CORENODE_IP: "$SANDBOX_CORENODE_IP"
    WSPORT: 39795
    HTTPPORT: 39796
    CHAINID: 39797
    DEPLOY_SERVER_IP: "$SANDBOX_SERVER_IP"
